<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Poster Creator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="editor-container">
        <header>
            <h1>Birthday Poster Creator</h1>
            <p>Design stunning birthday posters</p>
        </header>

        <main>
            <section class="controls">
                <h3>Customize Your Poster</h3>
                <form id="posterForm">
                    <div class="form-group">
                        <label for="name">Birthday Person:</label>
                        <input type="text" id="name" placeholder="Enter name" value="Madula Phindulo Pearl">
                    </div>
                    <div class="form-group">
                        <label for="age">Age:</label>
                        <input type="number" id="age" placeholder="Enter age" value="21">
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" rows="4" placeholder="Enter your message">May your 21st year be filled with wonderful moments and endless joy! You made it this far because of his grace and love.</textarea>
                    </div>
                    <div class="form-group">
                        <label for="theme">Theme:</label>
                        <select id="theme">
                            <option value="purple">Purple Elegance</option>
                            <option value="pink">Pink Celebration</option>
                            <option value="blue">Blue Ocean</option>
                            <option value="gold">Gold Luxury</option>
                        </select>
                    </div>
                    <button type="button" onclick="downloadPoster()">Download Poster</button>
                </form>
            </section>

            <section class="poster-preview">
                <div class="poster" id="birthdayPoster">
                    <div class="poster-confetti"></div>
                    <div class="poster-content">
                        <div class="poster-header">
                            <p class="poster-label">Special Day For</p>
                            <h1 id="posterName" class="poster-name">Madula Phindulo Pearl</h1>
                        </div>
                        <div class="poster-age-circle">
                            <span id="posterAge" class="age-number">21</span>
                        </div>
                        <p id="posterMessage" class="poster-message">May your 21st year be filled with wonderful moments and endless joy!</p>
                        <div class="poster-decorations">
                            <span class="decoration">✨</span>
                            <span class="decoration">🎉</span>
                            <span class="decoration">✨</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Birthday Poster Creator</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
